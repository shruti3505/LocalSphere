version: '3.8'
services:
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://database:27017/localvendor
      - JWT_SECRET=your_jwt_secret_here
    depends_on:
      - database

volumes:
  mongo-data:
